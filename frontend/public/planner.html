<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Syllabus Planner | Faculty Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- Font sizes badhane ke liye naya CSS --- */
        body { font-size: 16px; }
        .input-box, button { font-size: 16px !important; }
        
        .ai-header { 
            background: var(--primary-grad); color: white; padding: 25px; 
            border-radius: 8px; margin-bottom: 25px; text-align: center; 
        }
        /* Heading aur text ko bada kiya */
        .ai-header h2 { font-size: 32px; margin-bottom: 10px; } 
        .ai-header p { font-size: 18px; } 
        
        #loader { display: none; text-align: center; padding: 20px; font-weight: bold; color: #6a11cb; font-size: 18px; }
        .spinner { 
            border: 4px solid #f3f3f3; border-top: 4px solid #6a11cb; border-radius: 50%; 
            width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .planner-controls { background: var(--bg-secondary); padding: 25px; border-radius: 12px; box-shadow: var(--card-shadow); margin-bottom: 20px; }
        .planner-controls label, .planner-controls p { font-size: 18px; }
        
        .data-table th, .data-table td { font-size: 16px; padding: 18px; }
        .row-done { background-color: #d4edda !important; }
        .text-done { text-decoration: line-through; color: #6c757d; }
    </style>
</head>
<body style="background: #f4f7f6;">
    
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="secondary-btn" onclick="window.location.href='dashboard.html'">← Back</button>
            <h2>Faculty Planner</h2>
        </div>
    </nav>
    
    <div class="container">
        <div class="ai-header">
            <h2 id="mainHeading">⚡ Loading Planner...</h2>
            <p>Make plan for upcoming semester | Subject: <span id="subjectLabel" style="font-weight:bold; color: #ffeb3b;">Loading...</span></p>
        </div>

        <div class="planner-controls">
            <label><strong>Syllabus Goals / Extract from PDF:</strong></label>
            <textarea id="promptInput" class="input-box" style="height: 100px; margin-top: 10px;" placeholder="Describe how you want to divide the topics..."></textarea>
            
            <p style="margin: 15px 0;">Plan for: <strong id="daysDisplay" style="color: #6a11cb;">--</strong> Days</p>
            <button class="primary-btn" id="genBtn" onclick="generateSyllabus()">✨ Generate & Save Plan</button>
        </div>

        <div id="loader">
            <div class="spinner"></div><br><br>
            ⏳ AI is organizing your syllabus into the database... Please wait.
        </div>

        <table class="data-table" id="resultTable" style="display: none; background: white;">
            <thead>
                <tr>
                    <th style="width: 10%; text-align: center;">Done</th>
                    <th style="width: 15%;">Day</th>
                    <th>Topic</th>
                    <th style="width: 15%;">Action</th>
                </tr>
            </thead>
            <tbody id="plannerBody"></tbody>
        </table>
    </div>

    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const classId = urlParams.get('class'); 
        let classData = null;

        // Page load hone par
        window.onload = async () => {
            const res = await api.get(`/planner/${classId}`);
            if (res.success) {
                classData = res; // AI generation ke liye data zaroori hai
                
                // Naya update: Dono jagah dynamically Subject Name dikhega
                document.getElementById('mainHeading').innerText = "⚡ " + res.subject + " Planner"; 
                document.getElementById('subjectLabel').innerText = res.subject; 
                document.getElementById('daysDisplay').innerText = res.num_days;
                
                if(res.plan && res.plan.length > 0) renderTable(res.plan);
            }
        };

        function renderTable(items) {
            const table = document.getElementById('resultTable');
            const tbody = document.getElementById('plannerBody');
            tbody.innerHTML = '';
            table.style.display = 'table';

            items.forEach((item) => {
                const row = document.createElement('tr');
                if (item.is_done) row.className = 'row-done';

                row.innerHTML = `
                    <td style="text-align: center;">
                        <input type="checkbox" style="width: 20px; height: 20px;" ${item.is_done ? 'checked' : ''} onchange="toggleDay(${item.day_no})">
                    </td>
                    <td><strong>Day ${item.day_no}</strong></td>
                    <td>
                        <input type="text" id="topic_${item.day_no}" class="input-box ${item.is_done ? 'text-done' : ''}" value="${item.topic}" style="margin: 0;">
                    </td>
                    <td>
                        <button class="success-btn" onclick="updateTopic(${item.day_no})">Save</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function generateSyllabus() {
            const promptText = document.getElementById('promptInput').value;
            const loader = document.getElementById('loader');
            const genBtn = document.getElementById('genBtn');

            loader.style.display = 'block';
            genBtn.disabled = true;

            try {
                // Backend se key lena
                const keyRes = await api.get('/get-ai-key');
                const SECURE_GROQ_KEY = keyRes.key;

                if (!SECURE_GROQ_KEY) throw new Error("API Key backend mein nahi mili!");

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${SECURE_GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{
                            role: "user",
                            content: `Divide this syllabus text into exactly ${classData.num_days} days. Text: ${classData.syllabus_text}. Goal: ${promptText}. Return ONLY a JSON array of strings.`
                        }],
                        temperature: 0.2
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const rawText = data.choices[0].message.content;
                const jsonMatch = rawText.match(/\[[\s\S]*\]/);
                
                if (!jsonMatch) {
                    throw new Error("AI did not generate a proper syllabus. Please click Generate again.");
                }

                const topicsArray = JSON.parse(jsonMatch[0]);
                const itemsToSave = topicsArray.map((topic, i) => ({
                    day_no: i + 1,
                    topic: topic,
                    is_done: false
                }));

                const saveRes = await api.post(`/planner/${classId}/save`, { items: itemsToSave });
                if (saveRes.success) {
                    location.reload();
                } else {
                    throw new Error(saveRes.message);
                }
            } catch (err) {
                alert("Error: " + err.message); 
            } finally {
                loader.style.display = 'none';
                genBtn.disabled = false;
            }
        }

        async function toggleDay(dayNo) {
            const res = await api.patch(`/planner/${classId}/toggle/${dayNo}`);
            if (res.success) location.reload();
        }

        async function updateTopic(dayNo) {
            const newTopic = document.getElementById(`topic_${dayNo}`).value;
            const res = await api.patch(`/planner/${classId}/update/${dayNo}`, { topic: newTopic });
            if (res.success) alert("Topic Updated!");
        }
    </script>
</body>
</html>
